<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watch Ad & Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <!-- 👇 RICHADS SDK INITIALIZATION 👇 -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
      window.TelegramAdsController = new TelegramAdsController();
      window.TelegramAdsController.initialize({
        pubId: "1007116",
        appId: "6894",
      });
    </script>

    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #13131a; 
            color: white; 
            text-align: center; 
            padding: 40px 20px; 
            margin: 0;
            overflow: hidden;
        }
        .coin { font-size: 60px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .btn { 
            background: linear-gradient(135deg, #f5c542 0%, #e0a800 100%); 
            color: black; 
            border: none; 
            padding: 18px 30px; 
            font-size: 18px; 
            font-weight: bold; 
            border-radius: 12px; 
            cursor: pointer; 
            width: 100%; 
            max-width: 300px; 
            margin-top: 30px; 
            box-shadow: 0 4px 15px rgba(245, 197, 66, 0.3); 
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { 
            background: #2a2a35; 
            color: #666; 
            cursor: not-allowed; 
            box-shadow: none; 
        }
        .subtitle { color: #888; font-size: 15px; margin-top: 10px; line-height: 1.5; }
        
        /* Timer styling */
        #timer-container {
            display: none;
            margin-top: 30px;
        }
        .progress-bar {
            width: 100%;
            max-width: 300px;
            height: 8px;
            background: #2a2a35;
            border-radius: 10px;
            margin: 15px auto;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #22c55e;
            transition: width 1s linear;
        }
        .time-text { font-size: 18px; font-weight: bold; color: #f5c542; }
    </style>
</head>
<body>
    <div class="container">
        <div class="coin">🪙</div>
        <h1>Watch Ad & Earn</h1>
        <p class="subtitle">Click the button below to view the sponsor ad. Keep this page open until the timer finishes!</p>
        
        <button id="ad-btn" class="btn" onclick="startTimer()">▶ Start Ad & Timer</button>
        
        <div id="timer-container">
            <p class="subtitle">Verifying ad view...</p>
            <div class="progress-bar">
                <div id="progress-fill" class="progress-fill"></div>
            </div>
            <div class="time-text"><span id="time-left">15</span> seconds left</div>
        </div>
    </div>

    <script>
        // Initialize Telegram Web App
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        
        // Disable swipe-to-close so they don't accidentally exit
        if (Telegram.WebApp.disableVerticalSwipes) {
            Telegram.WebApp.disableVerticalSwipes();
        }

        function startTimer() {
            const btn = document.getElementById('ad-btn');
            const timerContainer = document.getElementById('timer-container');
            const timeLeftSpan = document.getElementById('time-left');
            const progressFill = document.getElementById('progress-fill');
            
            // 1. Hide button and show timer
            btn.style.display = 'none';
            timerContainer.style.display = 'block';
            
            // 2. Set the countdown total (15 seconds)
            const totalSeconds = 15;
            let currentSeconds = totalSeconds;

            // Optional: Try to force the RichAds SDK to show just in case it responds to .show()
            try { if (window.TelegramAdsController && window.TelegramAdsController.show) window.TelegramAdsController.show(); } catch(e) {}
            
            // 3. Start the interval loop
            const interval = setInterval(() => {
                currentSeconds--;
                timeLeftSpan.innerText = currentSeconds;
                
                // Update green progress bar visually
                const percentage = ((totalSeconds - currentSeconds) / totalSeconds) * 100;
                progressFill.style.width = percentage + '%';
                
                // 4. When it hits zero, reward the user
                if (currentSeconds <= 0) {
                    clearInterval(interval);
                    
                    // Tell Python bot the ad was successfully watched!
                    Telegram.WebApp.sendData(JSON.stringify({ad_completed: true}));
                    Telegram.WebApp.close();
                }
            }, 1000); // Runs every 1000 milliseconds (1 second)
        }
    </script>
</body>
</html>
