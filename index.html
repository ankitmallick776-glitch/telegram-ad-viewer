<script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        if (Telegram.WebApp.disableVerticalSwipes) { Telegram.WebApp.disableVerticalSwipes(); }

        // 👇 YOUR ADSTERRA DIRECT LINK 👇
        const DIRECT_LINK = "https://www.profitablecpmratenetwork.com/abe5f1zk?key=a0995fd9560541c674b9a739cad4399b";

        // ==========================================
        // 🕵️ ANTI-FRAUD: ADBLOCKER DETECTION (FIXED)
        // ==========================================
        function checkAdBlocker() {
            // Use a silent network fetch instead of an Image object to prevent MIME type errors
            fetch("https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js", { method: 'HEAD', mode: 'no-cors' })
                .then(() => {
                    // Network allowed the ad domain! Safe to proceed.
                    const btn = document.getElementById('ad-btn');
                    btn.disabled = false;
                    btn.innerHTML = "▶ Open Sponsor Link";
                })
                .catch(() => {
                    // The network blocked the ad domain! Fraud detected.
                    document.getElementById('adblock-warning').style.display = 'block';
                    document.getElementById('main-text').style.display = 'none';
                    
                    const btn = document.getElementById('ad-btn');
                    btn.innerHTML = "❌ Disabled";
                    btn.disabled = true;
                });
        }

        // Run the anti-fraud check the second the app opens
        setTimeout(checkAdBlocker, 500);

        // ==========================================
        // ⏱️ AD LAUNCH & TIMER
        // ==========================================
        function openAdAndStartTimer() {
            const btn = document.getElementById('ad-btn');
            const timerContainer = document.getElementById('timer-container');
            const timeLeftSpan = document.getElementById('time-left');
            const progressFill = document.getElementById('progress-fill');
            
            // Force the ad to open in a new tab
            Telegram.WebApp.openLink(DIRECT_LINK);
            
            // Hide button and show timer
            btn.style.display = 'none';
            timerContainer.style.display = 'block';
            
            let currentSeconds = 15;
            
            const interval = setInterval(() => {
                currentSeconds--;
                timeLeftSpan.innerText = currentSeconds;
                
                const percentage = ((15 - currentSeconds) / 15) * 100;
                progressFill.style.width = percentage + '%';
                
                // Reward the user
                if (currentSeconds <= 0) {
                    clearInterval(interval);
                    Telegram.WebApp.sendData(JSON.stringify({ad_completed: true}));
                    Telegram.WebApp.close();
                }
            }, 1000);
        }
    </script>
