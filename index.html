<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watch Ad & Earn</title>
    <!-- Step 1: Telegram Web App -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Step 2: RichAds SDK -->
    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container { text-align: center; padding: 2rem; }
        h1 { font-size: 1.8rem; margin-bottom: 1rem; }
        p { color: #aaa; margin-bottom: 1rem; }
        .status { margin-top: 1rem; font-size: 0.9rem; color: #f0a500; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 Watch Ad & Earn</h1>
        <p>Loading your rewarded ad...</p>
        <div class="status" id="status">⏳ Initializing...</div>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();

        const statusEl = document.getElementById('status');

        function sendResult(completed, reason) {
            Telegram.WebApp.sendData(JSON.stringify({
                ad_completed: completed,
                reason: reason || null
            }));
            Telegram.WebApp.close();
        }

        // Step 3: Initialize RichAds controller
        const richadsController = new TelegramAdsController();
        richadsController.initialize({
            pubId: "1007116",   // ← your pubId
            appId: "6894",      // ← your appId
            debug: false        // set true to test with dummy ads
        });

        statusEl.textContent = '▶️ Loading ad...';

        // Step 4: Trigger the ad
        // Options: triggerInterstitialVideo() | triggerInterstitialBanner() | triggerNativeNotification()
        richadsController.triggerInterstitialVideo()
            .then((result) => {
                // Ad completed — reward the user
                console.log('Ad completed:', result);
                sendResult(true);
            })
            .catch((result) => {
                // Ad failed or was skipped
                console.log('Ad failed/skipped:', result);
                sendResult(false, result || 'ad_not_shown');
            });
    </script>
</body>
</html>
