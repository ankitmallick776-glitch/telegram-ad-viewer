<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Watch Ad & Earn</title>

    <!-- ✅ REQUIRED FIRST: Telegram Web App script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #13131a;
            color: white;
            text-align: center;
            padding: 30px 20px 40px;
            margin: 0;
            overflow: hidden;
        }
        .coin {
            font-size: 56px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-10px); }
        }
        h1 { margin: 0 0 6px; font-size: 22px; }
        .subtitle {
            color: #888;
            font-size: 14px;
            margin: 0 0 20px;
            line-height: 1.5;
        }
        .energy-section {
            background: #1e1e2e;
            border-radius: 14px;
            padding: 14px 18px;
            margin: 0 auto 20px;
            max-width: 320px;
        }
        .energy-label {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .energy-label span { color: #f5c542; font-weight: bold; }
        .energy-slots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 8px;
        }
        .slot {
            width: 44px;
            height: 22px;
            border-radius: 6px;
            background: #2a2a3a;
            border: 2px solid #3a3a4a;
            transition: background 0.4s, border-color 0.4s;
        }
        .slot.filled {
            background: linear-gradient(135deg, #f5c542, #e0a800);
            border-color: #f5c542;
            box-shadow: 0 0 8px rgba(245,197,66,0.5);
        }
        .regen-timer { font-size: 12px; color: #666; }
        .regen-timer.active { color: #f5c542; }
        .btn {
            background: linear-gradient(135deg, #f5c542 0%, #e0a800 100%);
            color: black;
            border: none;
            padding: 16px 30px;
            font-size: 17px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            max-width: 300px;
            margin-top: 4px;
            box-shadow: 0 4px 15px rgba(245,197,66,0.3);
            transition: transform 0.1s, opacity 0.2s;
        }
        .btn:active:not(:disabled) { transform: scale(0.96); }
        .btn:disabled {
            background: #2a2a35;
            color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }
        .status-msg {
            margin-top: 14px;
            font-size: 13px;
            color: #888;
            min-height: 18px;
        }
        .status-msg.error { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="coin">🪙</div>
    <h1>Watch Ad &amp; Earn</h1>
    <p class="subtitle">Watch a short ad and claim your coins.<br>You have <strong>5 energy</strong> — 1 regens every 24 min.</p>

    <div class="energy-section">
        <div class="energy-label">
            <span id="energy-text">⚡ Energy: ? / 5</span>
            <span id="ads-left-text" style="color:#aaa;font-weight:normal;font-size:12px;"></span>
        </div>
        <div class="energy-slots" id="energy-slots">
            <div class="slot" id="s0"></div>
            <div class="slot" id="s1"></div>
            <div class="slot" id="s2"></div>
            <div class="slot" id="s3"></div>
            <div class="slot" id="s4"></div>
        </div>
        <div class="regen-timer" id="regen-timer">Loading...</div>
    </div>

    <button id="ad-btn" class="btn" onclick="watchAd()" disabled>⏳ Connecting...</button>
    <div class="status-msg" id="status-msg"></div>

    <script>
        // ── Telegram setup ──────────────────────────────────────────
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        if (Telegram.WebApp.disableVerticalSwipes) Telegram.WebApp.disableVerticalSwipes();

        // ── Constants ───────────────────────────────────────────────
        const MAX_ENERGY    = 5;
        const REGEN_MS      = 24 * 60 * 1000;
        const STORAGE_KEY_E = 'cashyads_energy';
        const STORAGE_KEY_T = 'cashyads_last_watch';

        // ── State ───────────────────────────────────────────────────
        let adReady    = false;
        let energy     = MAX_ENERGY;
        let lastWatch  = 0;
        let regenTimer = null;

        // ── LocalStorage helpers ────────────────────────────────────
        function loadEnergy() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY_E);
                energy    = raw !== null ? Math.min(parseInt(raw), MAX_ENERGY) : MAX_ENERGY;
                const t   = localStorage.getItem(STORAGE_KEY_T);
                lastWatch = t ? parseInt(t) : 0;
            } catch(e) { energy = MAX_ENERGY; lastWatch = 0; }
        }

        function saveEnergy() {
            try {
                localStorage.setItem(STORAGE_KEY_E, String(energy));
                localStorage.setItem(STORAGE_KEY_T, String(lastWatch));
            } catch(e) {}
        }

        // ── Regen logic ─────────────────────────────────────────────
        function applyRegen() {
            if (energy >= MAX_ENERGY || lastWatch === 0) return 0;
            const now    = Date.now();
            const gained = Math.floor((now - lastWatch) / REGEN_MS);
            if (gained > 0) {
                energy    = Math.min(energy + gained, MAX_ENERGY);
                lastWatch = lastWatch + gained * REGEN_MS;
                saveEnergy();
            }
            if (energy >= MAX_ENERGY) return 0;
            return REGEN_MS - ((now - lastWatch) % REGEN_MS);
        }

        // ── UI updaters ─────────────────────────────────────────────
        function updateUI() {
            const msLeft = applyRegen();
            for (let i = 0; i < MAX_ENERGY; i++)
                document.getElementById('s' + i).classList.toggle('filled', i < energy);

            document.getElementById('energy-text').textContent = `⚡ Energy: ${energy} / ${MAX_ENERGY}`;
            document.getElementById('ads-left-text').textContent =
                energy > 0 ? `${energy} ad${energy > 1 ? 's' : ''} remaining` : 'Recharging…';

            const timerEl = document.getElementById('regen-timer');
            if (energy >= MAX_ENERGY) {
                timerEl.textContent = '✅ Energy full';
                timerEl.className   = 'regen-timer';
            } else {
                const mins = Math.floor(msLeft / 60000);
                const secs = Math.floor((msLeft % 60000) / 1000);
                timerEl.textContent = `Next recharge in ${mins}m ${secs < 10 ? '0' : ''}${secs}s`;
                timerEl.className   = 'regen-timer active';
            }

            const btn = document.getElementById('ad-btn');
            if (energy <= 0) {
                btn.disabled  = true;
                btn.innerText = '⚡ No energy — wait for recharge';
            } else if (!adReady) {
                btn.disabled  = true;
                btn.innerText = '⏳ Connecting…';
            } else {
                btn.disabled  = false;
                btn.innerText = '▶ Watch Ad Now';
            }
        }

        function startRegenClock() {
            if (regenTimer) clearInterval(regenTimer);
            regenTimer = setInterval(() => {
                updateUI();
                if (energy >= MAX_ENERGY) clearInterval(regenTimer);
            }, 1000);
        }

        function setStatus(msg, isError) {
            const el      = document.getElementById('status-msg');
            el.textContent = msg;
            el.className  = 'status-msg' + (isError ? ' error' : '');
        }

        // ── RichAds: dynamically inject SDK then initialise ──────────
        // Dynamic injection gives us real onload/onerror events and
        // avoids the race condition of a static <script> tag.
        function initRichAds() {

            // Already loaded (e.g. cached)?
            if (typeof TelegramAdsController !== 'undefined') {
                setupController();
                return;
            }

            const script = document.createElement('script');
            script.src   = 'https://richinfo.co/richpartners/telegram/js/tg-ob.js';
            script.async = true;

            script.onload = function () {
                // Small delay to let the script finish defining its globals
                setTimeout(function () {
                    if (typeof TelegramAdsController !== 'undefined') {
                        setupController();
                    } else {
                        console.error('TelegramAdsController still undefined after load');
                        setStatus('❌ Ad network failed to initialise.', true);
                    }
                }, 500);
            };

            script.onerror = function () {
                console.error('RichAds SDK script failed to load');
                setStatus('❌ Ad network failed to load. Check your internet connection.', true);
            };

            document.head.appendChild(script);
        }

        function setupController() {
            try {
                window.TelegramAdsController = new TelegramAdsController();
                window.TelegramAdsController.initialize({
                    pubId: "1007116",
                    appId: "6894",
                });
                adReady = true;
                updateUI();
                console.log('✅ RichAds TelegramAdsController ready');
            } catch (err) {
                console.error('RichAds initialize() error:', err);
                setStatus('❌ Ad network error: ' + err.message, true);
            }
        }

        // ── Watch ad ────────────────────────────────────────────────
        function watchAd() {
            if (!adReady || energy <= 0) return;

            const btn     = document.getElementById('ad-btn');
            btn.disabled  = true;
            btn.innerText = '⏳ Playing ad…';
            setStatus('');

            window.TelegramAdsController.showAd()
                .then(function () {
                    energy--;
                    if (lastWatch === 0 || energy === MAX_ENERGY - 1) lastWatch = Date.now();
                    saveEnergy();
                    updateUI();
                    startRegenClock();

                    Telegram.WebApp.sendData(JSON.stringify({
                        ad_completed: true,
                        energy_left:  energy
                    }));
                    Telegram.WebApp.close();
                })
                .catch(function (err) {
                    console.error('Ad skipped/failed:', err);
                    btn.disabled  = false;
                    btn.innerText = '▶ Watch Ad Now';
                    setStatus('Ad was skipped — watch the full ad to earn.', true);

                    Telegram.WebApp.sendData(JSON.stringify({ ad_completed: false }));
                    Telegram.WebApp.close();
                });
        }

        // ── Bootstrap ────────────────────────────────────────────────
        loadEnergy();
        applyRegen();
        updateUI();
        startRegenClock();

        // Init after full page load so telegram-web-app.js is confirmed ready
        window.addEventListener('load', initRichAds);
    </script>
</body>
</html>
