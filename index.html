<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- 🛑 CACHE BUSTERS: Forces Telegram to load the newest code every time -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Watch Ad & Earn</title>
    
    <!-- 1. Load Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #13131a; color: white; text-align: center; padding: 40px 20px; margin: 0; overflow: hidden; }
        .coin { font-size: 60px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .btn { background: linear-gradient(135deg, #f5c542 0%, #e0a800 100%); color: black; border: none; padding: 18px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; max-width: 300px; margin-top: 30px; box-shadow: 0 4px 15px rgba(245, 197, 66, 0.3); transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { background: #2a2a35; color: #666; cursor: not-allowed; box-shadow: none; }
        
        .subtitle { color: #888; font-size: 15px; margin-top: 10px; line-height: 1.5; }
        
        /* Debug Box for instant feedback */
        #debug-log { background: #1e1e2e; border-left: 4px solid #f5c542; color: #a6accd; padding: 12px; border-radius: 4px; font-family: monospace; font-size: 12px; margin-top: 40px; text-align: left; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <div class="coin">🪙</div>
        <h1>Watch Ad & Earn</h1>
        <p class="subtitle">Click the button below to view a short sponsored video and claim your coins.</p>

        <!-- Button starts locked until SDK is fully ready -->
        <button id="ad-btn" class="btn" onclick="playOnClickAd()" disabled>⏳ Connecting to ad network...</button>
        
        <!-- Live System Log -->
        <div id="debug-log">
            <strong style="color:white;">System Status:</strong><br>
            <span id="log-text">> Booting app...</span>
        </div>
    </div>

    <script>
        // --- TELEGRAM SETUP ---
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        if (Telegram.WebApp.disableVerticalSwipes) { Telegram.WebApp.disableVerticalSwipes(); }

        // --- UTILITY LOGGING ---
        function logStatus(message) {
            document.getElementById('log-text').innerHTML += `<br>> ${message}`;
            console.log(message);
        }

        // 👇 PUT YOUR ACTUAL SPOT ID HERE 👇
        const ONCLICKA_SPOT_ID = '6115742'; 
        
        // This variable will hold the secret "show()" command
        let triggerAd = null; 

        // --- ONCLICKA INITIALIZATION SEQUENCE ---
        function initAdNetwork() {
            logStatus("tma.js script loaded. Initializing engine...");
            
            if (typeof window.initCdTma === 'function') {
                window.initCdTma({ id: ONCLICKA_SPOT_ID })
                    .then(show => {
                        logStatus("✅ Ad Engine Ready!");
                        triggerAd = show; // Save the show method
                        
                        // Unlock the UI
                        const btn = document.getElementById('ad-btn');
                        btn.innerText = "▶ Watch Ad Now";
                        btn.disabled = false;
                    })
                    .catch(e => {
                        logStatus("❌ Init Error: " + (e.message || JSON.stringify(e)));
                        document.getElementById('ad-btn').innerText = "❌ No ads available";
                    });
            } else {
                logStatus("❌ Error: initCdTma function not found in SDK.");
            }
        }

        // --- THE BUTTON CLICK EVENT ---
        function playOnClickAd() {
            if (!triggerAd) {
                alert("Ad engine is not ready yet.");
                return;
            }

            const btn = document.getElementById('ad-btn');
            btn.disabled = true;
            btn.innerText = "⏳ Playing ad...";
            logStatus("Triggering ad sequence...");

            // Execute the retrieved show() method
            triggerAd()
                .then(() => {
                    logStatus("✅ Ad played successfully. Sending coins!");
                    // Reward user
                    Telegram.WebApp.sendData(JSON.stringify({ad_completed: true}));
                    Telegram.WebApp.close();
                })
                .catch(e => {
                    logStatus("❌ Ad skipped or failed: " + (e.message || JSON.stringify(e)));
                    // Do not reward user
                    Telegram.WebApp.sendData(JSON.stringify({ad_completed: false}));
                    Telegram.WebApp.close();
                });
        }
    </script>

    <!-- 2. Load OnClickA SDK last, and explicitly fire the initialization when it finishes downloading -->
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js" onload="initAdNetwork()"></script>
</body>
</html>
