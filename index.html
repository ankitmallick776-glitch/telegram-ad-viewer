<script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        
        function startRichAd() {
            if (!window.TelegramAdsController) {
                alert("SDK completely failed to load. Check AdBlocker/DNS.");
                return;
            }

            let commands = [];
            
            // X-Ray the SDK to find all available functions
            for (let prop in window.TelegramAdsController) {
                if (typeof window.TelegramAdsController[prop] === 'function') {
                    commands.push(prop);
                }
            }
            
            // Catch hidden class methods
            let proto = Object.getPrototypeOf(window.TelegramAdsController);
            if (proto) {
                Object.getOwnPropertyNames(proto).forEach(prop => {
                    if (typeof window.TelegramAdsController[prop] === 'function' && prop !== 'constructor' && !commands.includes(prop)) {
                        commands.push(prop);
                    }
                });
            }

            alert("RichAds Commands: " + commands.join(", "));
            
            // Reset button
            document.getElementById('ad-btn').disabled = false;
        }
    </script>
