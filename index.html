<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- 🛑 CACHE BUSTERS (Kept these so future updates push instantly to users) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Watch Ad & Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #13131a; color: white; text-align: center; padding: 40px 20px; margin: 0; overflow: hidden; }
        .coin { font-size: 60px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .btn { background: linear-gradient(135deg, #f5c542 0%, #e0a800 100%); color: black; border: none; padding: 18px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; max-width: 300px; margin-top: 20px; box-shadow: 0 4px 15px rgba(245, 197, 66, 0.3); transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { background: #2a2a35; color: #666; cursor: not-allowed; box-shadow: none; }
        
        .subtitle { color: #888; font-size: 15px; margin-top: 10px; line-height: 1.5; }
        
        /* The invisible box where OnClickA injects the video */
        #ad-container { width: 100%; max-width: 320px; margin: 15px auto; min-height: 10px; transition: all 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="coin">🪙</div>
        <h1>Watch Ad & Earn</h1>
        <p class="subtitle">Click the button below to view a short sponsored video and claim your coins.</p>

        <!-- OnClickA Video Selector Container -->
        <div id="ad-container"></div>

        <button id="ad-btn" class="btn" onclick="playOnClickAd()" disabled>⏳ Connecting...</button>
    </div>

    <script>
        // --- TELEGRAM SETUP ---
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        if (Telegram.WebApp.disableVerticalSwipes) { Telegram.WebApp.disableVerticalSwipes(); }

        // 👇 PUT YOUR ACTUAL SPOT ID HERE ONE LAST TIME 👇
        const ONCLICKA_SPOT_ID = '6115742'; 
        
        let triggerAd = null; 

        // --- ONCLICKA INITIALIZATION ---
        function initAdNetwork() {
            if (typeof window.initCdTma === 'function') {
                window.initCdTma({ id: ONCLICKA_SPOT_ID })
                    .then(show => {
                        triggerAd = show; 
                        const btn = document.getElementById('ad-btn');
                        btn.innerText = "▶ Watch Ad Now";
                        btn.disabled = false;
                    })
                    .catch(e => {
                        console.error("Init Error:", e);
                        document.getElementById('ad-btn').innerText = "❌ No ads available";
                    });
            } else {
                console.error("initCdTma function not found in SDK.");
            }
        }

        // --- BUTTON CLICK EVENT ---
        function playOnClickAd() {
            if (!triggerAd) return;

            const btn = document.getElementById('ad-btn');
            btn.disabled = true;
            btn.innerText = "⏳ Playing ad...";

            triggerAd()
                .then(() => {
                    // Reward user for successfully watching
                    Telegram.WebApp.sendData(JSON.stringify({ad_completed: true}));
                    Telegram.WebApp.close();
                })
                .catch(e => {
                    console.error("Ad skipped or failed:", e);
                    // Do not reward user if they skip
                    Telegram.WebApp.sendData(JSON.stringify({ad_completed: false}));
                    Telegram.WebApp.close();
                });
        }
    </script>

    <!-- Load OnClickA SDK and trigger init immediately when ready -->
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js" onload="initAdNetwork()"></script>
</body>
</html>
