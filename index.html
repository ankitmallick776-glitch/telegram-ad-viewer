<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Watch Ad & Earn</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>

    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #13131a; color: white; text-align: center; padding: 40px 20px; margin: 0; overflow: hidden; }
        .coin { font-size: 60px; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
        
        .btn { background: linear-gradient(135deg, #f5c542 0%, #e0a800 100%); color: black; border: none; padding: 18px 30px; font-size: 18px; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; max-width: 300px; margin-top: 30px; box-shadow: 0 4px 15px rgba(245, 197, 66, 0.3); transition: transform 0.1s; }
        .btn:active { transform: scale(0.96); }
        .btn:disabled { background: #2a2a35; color: #666; cursor: not-allowed; box-shadow: none; }
        
        .subtitle { color: #888; font-size: 15px; margin-top: 10px; line-height: 1.5; }
        .loading-text { color: #f5c542; font-size: 14px; margin-top: 15px; display: none; font-weight: bold; }
        
        /* Debug Box so we can see network errors */
        #debug-log { background: #1e1e2e; color: #a6accd; padding: 10px; border-radius: 8px; font-family: monospace; font-size: 11px; margin-top: 30px; text-align: left; word-wrap: break-word; }
    </style>
</head>
<body>
    <div class="container">
        <div class="coin">🪙</div>
        <h1>Watch Ad & Earn</h1>
        <p class="subtitle">Click the button below to view a short sponsored video and claim your coins.</p>

        <button id="ad-btn" class="btn" onclick="playAd()" disabled>⏳ Loading Ad Engine...</button>
        <div id="loading" class="loading-text">Playing ad... please do not close.</div>
        
        <div id="debug-log">System Log:<br></div>
    </div>

    <script>
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        if (Telegram.WebApp.disableVerticalSwipes) { Telegram.WebApp.disableVerticalSwipes(); }

        // 👇 PUT YOUR ACTUAL SPOT ID HERE 👇
        const ONCLICKA_SPOT_ID = 'Your Spot ID'; 

        function logDebug(message) {
            const logBox = document.getElementById('debug-log');
            logBox.innerHTML += `> ${message}<br>`;
        }

        // 🧠 Smart Loader: Wait for OnClickA SDK to load
        function connectOnClickA() {
            if (window.initCdTma) {
                logDebug("SDK found. Connecting to Spot ID...");
                
                window.initCdTma({ id: ONCLICKA_SPOT_ID })
                    .then(show => {
                        logDebug("✅ Connection Successful! Ad Ready.");
                        window.showAd = show;
                        const btn = document.getElementById('ad-btn');
                        btn.innerText = "▶ Watch Ad Now";
                        btn.disabled = false;
                    })
                    .catch(e => {
                        logDebug("❌ Connection Failed: " + (e.message || JSON.stringify(e)));
                        const btn = document.getElementById('ad-btn');
                        btn.innerText = "❌ No Ads Available";
                    });
            } else {
                logDebug("Waiting for SDK to download...");
                setTimeout(connectOnClickA, 500); // Check again in half a second
            }
        }

        // Start the loader
        connectOnClickA();

        function playAd() {
            const btn = document.getElementById('ad-btn');
            const loading = document.getElementById('loading');
            
            btn.disabled = true;
            loading.style.display = "block";
            logDebug("Attempting to play ad...");

            if (window.showAd) {
                window.showAd()
                    .then(() => {
                        logDebug("✅ Ad Finished. Sending coins!");
                        Telegram.WebApp.sendData(JSON.stringify({ad_completed: true}));
                        Telegram.WebApp.close();
                    })
                    .catch((e) => {
                        logDebug("❌ Ad Skipped or Error: " + (e.message || JSON.stringify(e)));
                        Telegram.WebApp.sendData(JSON.stringify({ad_completed: false}));
                        Telegram.WebApp.close();
                    });
            } else {
                logDebug("❌ Error: window.showAd is undefined.");
                alert("Ad engine is not ready. Try again in a moment!");
                btn.disabled = false;
                loading.style.display = "none";
            }
        }
    </script>
</body>
</html>
