<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Watch Ad & Earn</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <script src="https://richinfo.co/richpartners/telegram/js/tg-ob.js"></script>
    <script>
      window.TelegramAdsController = new TelegramAdsController();
      window.TelegramAdsController.initialize({
        pubId: "1007116",
        appId: "6894",
      });
    <script>
        // ── Telegram setup ──────────────────────────────────────────
        Telegram.WebApp.ready();
        Telegram.WebApp.expand();
        if (Telegram.WebApp.disableVerticalSwipes) Telegram.WebApp.disableVerticalSwipes();

        // ── Constants ───────────────────────────────────────────────
        const MAX_ENERGY      = 5;
        const REGEN_MS        = 24 * 60 * 1000;   // 24 minutes per energy
        const STORAGE_KEY_E   = 'cashyads_energy';
        const STORAGE_KEY_T   = 'cashyads_last_watch';

        // ── State ───────────────────────────────────────────────────
        let energy     = MAX_ENERGY;
        let lastWatch  = 0;       
        let regenTimer = null;

        // ── LocalStorage helpers ────────────────────────────────────
        function loadEnergy() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY_E);
                energy    = raw !== null ? Math.min(parseInt(raw), MAX_ENERGY) : MAX_ENERGY;
                const t   = localStorage.getItem(STORAGE_KEY_T);
                lastWatch = t ? parseInt(t) : 0;
            } catch(e) {
                energy = MAX_ENERGY; lastWatch = 0;
            }
        }

        function saveEnergy() {
            try {
                localStorage.setItem(STORAGE_KEY_E, String(energy));
                localStorage.setItem(STORAGE_KEY_T, String(lastWatch));
            } catch(e) {}
        }

        // ── Regen logic ─────────────────────────────────────────────
        function applyRegen() {
            if (energy >= MAX_ENERGY) return 0;       
            if (lastWatch === 0)      return 0;

            const now     = Date.now();
            const elapsed = now - lastWatch;
            const gained  = Math.floor(elapsed / REGEN_MS);

            if (gained > 0) {
                energy    = Math.min(energy + gained, MAX_ENERGY);
                lastWatch = lastWatch + gained * REGEN_MS;
                saveEnergy();
            }

            if (energy >= MAX_ENERGY) return 0;
            return REGEN_MS - ((now - lastWatch) % REGEN_MS);
        }

        // ── UI updaters ─────────────────────────────────────────────
        function updateUI() {
            const msLeft = applyRegen();

            for (let i = 0; i < MAX_ENERGY; i++) {
                document.getElementById('s' + i).classList.toggle('filled', i < energy);
            }

            document.getElementById('energy-text').textContent = `⚡ Energy: ${energy} / ${MAX_ENERGY}`;
            document.getElementById('ads-left-text').textContent =
                energy > 0 ? `${energy} ad${energy > 1 ? 's' : ''} remaining` : 'Recharging…';

            const timerEl = document.getElementById('regen-timer');
            if (energy >= MAX_ENERGY) {
                timerEl.textContent = '✅ Energy full';
                timerEl.className   = 'regen-timer';
            } else {
                const mins = Math.floor(msLeft / 60000);
                const secs = Math.floor((msLeft % 60000) / 1000);
                timerEl.textContent = `Next recharge in ${mins}m ${secs < 10 ? '0' : ''}${secs}s`;
                timerEl.className   = 'regen-timer active';
            }

            const btn = document.getElementById('ad-btn');
            if (energy <= 0) {
                btn.disabled   = true;
                btn.innerText  = '⚡ No energy — wait for recharge';
            } else if (typeof window.TelegramAdsController === 'undefined') {
                btn.disabled  = true;
                btn.innerText = '⏳ Connecting…';
            } else {
                btn.disabled  = false;
                btn.innerText = '▶ Watch Ad Now';
            }
        }

        function startRegenClock() {
            if (regenTimer) clearInterval(regenTimer);
            regenTimer = setInterval(() => {
                updateUI();
                if (energy >= MAX_ENERGY) clearInterval(regenTimer);
            }, 1000);
        }

        function setStatus(msg, isError) {
            const el      = document.getElementById('status-msg');
            el.textContent = msg;
            el.className  = 'status-msg' + (isError ? ' error' : '');
        }

        // ── Success Logic (Reward the User) ──────────────────────────
        function handleAdSuccess() {
            energy--;
            if (lastWatch === 0 || energy === MAX_ENERGY - 1) {
                lastWatch = Date.now();
            }
            saveEnergy();
            updateUI();
            startRegenClock();

            // Tell the bot: ad completed + remaining energy
            Telegram.WebApp.sendData(JSON.stringify({
                ad_completed: true,
                energy_left:  energy
            }));
            
            Telegram.WebApp.close();
        }

        // ── Watch ad ────────────────────────────────────────────────
        function watchAd() {
            if (typeof window.TelegramAdsController === 'undefined') {
                setStatus('❌ Ad network not ready yet.', true);
                return;
            }
            if (energy <= 0) {
                setStatus('⚡ No energy! Wait for recharge.', true);
                return;
            }

            const btn = document.getElementById('ad-btn');
            btn.disabled  = true;
            btn.innerText = '⏳ Playing ad…';
            setStatus('');

            // Safety net
            let safetyTimer = setTimeout(() => {
                btn.disabled = false;
                btn.innerText = '▶ Watch Ad Now';
                setStatus('⚠️ Ad took too long to load. Please try again.', true);
            }, 15000); 

            try {
                // Call show() completely empty. Many SDKs break if you pass arguments they don't expect.
                const adRequest = window.TelegramAdsController.show();

                if (adRequest && typeof adRequest.then === 'function') {
                    adRequest
                        .then(() => {
                            clearTimeout(safetyTimer); 
                            handleAdSuccess();
                        })
                        .catch((err) => {
                            clearTimeout(safetyTimer); 
                            btn.disabled  = false;
                            btn.innerText = '▶ Watch Ad Now';
                            setStatus('Ad failed or was skipped.', true);
                        });
                } else {
                    // If it doesn't return a promise, it might just open the ad immediately
                    clearTimeout(safetyTimer);
                    setStatus('⚠️ Ad signal sent, waiting for completion...', false);
                }
            } catch (error) {
                // If it crashes, print the EXACT error to the screen so we can see what's wrong.
                clearTimeout(safetyTimer);
                btn.disabled = false;
                btn.innerText = '▶ Watch Ad Now';
                setStatus('ERROR: ' + error.message, true);
            }
        }

        // ── Bootstrap ────────────────────────────────────────────────
        loadEnergy();
        applyRegen();
        updateUI();
        startRegenClock();
    </script>
</body>
</html>
